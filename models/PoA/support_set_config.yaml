# Support-set configurations for PoA and DRO-PoA analyses.
#
# The selected mapping is passed directly as support_set_config.
#
# Wind generators are keyed by their reference-case names. For test_case1,
# W3 is generator index 2, W4 is generator index 3, and W5 is generator index 4.
# Accepted keys:
#   demand_reference: scalar or length-T profile for \bar{D}_t
#   demand_min, demand_max: D bounds
#   demand_ramp: R^D
#   demand_budget: B^D
#   wind_generators: per wind-generator support parameters
#     <generator_name>:
#       reference: scalar/profile for \bar{P}^{max}_{i,t}
#       min, max: realized capacity bounds
#   wind_ramp: R^G
#   wind_budget: B^W
#
# Legacy wind_reference, wind_min, and wind_max mappings are still accepted.

default_support_set: test_case1_base

support_sets:
  test_case1_base:
    description: Loosened support set for test_case1 with broad trajectory uncertainty.
    demand_reference: 150.0
    demand_min: 110.0
    demand_max: 175.0
    demand_ramp: 75.0
    demand_budget: 150.0

    wind_generators:
      W3:
        reference: 35.0
        min: 10.0
        max: 50.0
      W4:
        reference: 35.0
        min: 10.0
        max: 50.0
      W5:
        reference: 35.0
        min: 10.0
        max: 50.0

    wind_ramp: 20.0
    wind_budget: 150.0
