# MPEC model configuration parameters
mpec_config:
  # Big-M construction method for KKT complementarity:
  #   global: use big_m_complementarity for primal slacks and dual variables
  #   fbbt: use Pyomo FBBT to tighten primal slack Big-M values
  #   manual: use manual_big_m_values dictionaries where supplied
  big_m_method: fbbt
  use_fbbt_big_m: true
  big_m_floor: 1.0e-8
  print_big_m_summary: true

  # Big-M values for complementarity constraints
  # Used for dual variables and as a fallback if FBBT cannot bound a slack.
  big_m_complementarity: 1000000.0
  
  # Big-M values for bid separation constraints  
  big_m_bid_separation: 1200.0
  
  # Big-M value for activation constraints
  big_m_activation: 1000000.0

  # Epsilon value for bid separation constraints
  bid_separation_epsilon: 0.1
  
  # Bid bounds
  alpha_min: 0.0
  alpha_max: 1200.0
