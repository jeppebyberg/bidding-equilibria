regime_sets:
  policy_training:
    description: Regime-driven stochastic demand and wind setup.
    # mu_D and sigma_D are in selected-reference-demand units.
    seed: 42
    enforce_dispatch_feasibility: true
    n_minus_one_margin: 0.0
    max_draw_attempts: 500

    regimes:
      - name: normal
        n_scenarios: 100
        mu_D: 0.73
        rho_D: 0.85
        sigma_D: 0.012
        mu_W: 0.70
        peak_W: 14.0
        rho_W: 0.80
        sigma_W: 0.05

      - name: high_demand
        n_scenarios: 100
        mu_D: 0.87
        rho_D: 0.85
        sigma_D: 0.012
        mu_W: 0.70
        peak_W: 14.0
        rho_W: 0.80
        sigma_W: 0.05

      - name: normal_peak_shift_wind
        n_scenarios: 100
        mu_D: 0.73
        rho_D: 0.85
        sigma_D: 0.012
        mu_W: 0.70
        peak_W: 2.0
        rho_W: 0.80
        sigma_W: 0.05

      - name: high_demand_peak_shift_wind
        n_scenarios: 100
        mu_D: 0.87
        rho_D: 0.85
        sigma_D: 0.012
        mu_W: 0.70
        peak_W: 2.0
