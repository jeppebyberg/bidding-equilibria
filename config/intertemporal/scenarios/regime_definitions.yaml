        mu_D: 110.0
        A_D: 0.125
        rho_D: 0.85
        sigma_D: 1.8
        mu_W: 0.70
        A_W: 0.15
        peak_W: 1.0
        rho_W: 0.80
        sigma_W: 0.05
        Corr: -0.25

      - name: high_demand_peak_shift_wind
